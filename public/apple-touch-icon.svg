  <!-- Bridge deck -->
  <line x1="30" y1="105" x2="150" y2="105" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <!-- Left pillar -->
  <line x1="52" y1="105" x2="52" y2="132" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <!-- Right pillar -->
  <line x1="128" y1="105" x2="128" y2="132" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <!-- Middle pillar -->
  <line x1="90" y1="55" x2="90" y2="132" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <!-- Cables -->
  <line x1="52" y1="105" x2="71" y2="67" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="105" x2="109" y2="67" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Base -->
